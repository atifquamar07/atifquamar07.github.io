  image: assets/img/atif_quamar_profile.jpg
  summary: I study efficient and reliable reasoning in foundation models. I like to understand how foundation models reason and how we can make that reasoning more efficient and trustworthy. A lot of what I do spans language and vision, with a focus on keeping these models safe, reliable and aligned with human values.

