        location: Abu Dhabi, UAE
        start_date: Feb 2026
        end_date: Present
        summary: Exploring self-consistency and uncertainty in language model reasoning.

      - company: University of Virginia
        position: Research Intern
        location: Virginia, United States
        start_date: Oct 2025
        end_date: Feb 2026
        summary: Developed a drift-resilient memory framework for code-execution agents using KL-constrained adapter updates, mitigating embedding distribution shifts during online learning to reduce unsafe code generation without compromising task success rates.

      - company: University of California - San Diego
        position: Research Intern
        location: California, United States
        start_date: Jul 2025
        end_date: Oct 2025
        summary: Worked on multimodal reasoning - interleaving text and visuals within the chain-of-thought, enabling models to "think" with sketches, diagrams, and images. This work bridges language and vision to solve complex problems with richer, more interpretable reasoning.

      - company: Purdue University
        position: Research Intern
        location: Indiana, United States
        start_date: Feb 2025
        end_date: Jul 2025
        summary: Proposed an inference-time alignment method that outperforms Best-of-N decoding by over 30%, while reducing reward model calls by 20%. Aligned LLMs in reducing harmlessness, improved reasoning and positive sentiment generation.

      - company: Insituate
        position: Co-Founder
        location: New Delhi, India
        start_date: Sep 2023
        end_date: Feb 2025
        summary: Built agentic software for the Supreme Court of India, Mizuho Bank, PNC Bank and Indian High Courts.

