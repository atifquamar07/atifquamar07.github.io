    Experience:
      - company: Mohamed bin Zayed University of Artificial Intelligence
        position: Visiting Researcher
        location: Abu Dhabi, UAE
        start_date: Feb 2026
        end_date: Present
        summary: Developing training and inference-time methods to improve reasoning in language models, including reinforcement learning, self-consistency, and test-time inference strategies, with applications to mathematical reasoning and coding while reducing unreliable reasoning paths.

      - company: University of Virginia
        position: Research Intern
        location: Virginia, United States
        start_date: Oct 2025
        end_date: Feb 2026
        summary: Developed a drift-resilient memory framework for code-execution agents using KL-constrained adapter updates, mitigating embedding distribution shifts during online learning to reduce unsafe code generation without compromising task success rates.

      - company: University of California San Diego
        position: Research Intern
        location: California, United States
        start_date: Jul 2025
        end_date: Oct 2025
        summary: Proposed a multimodal Chain-of-Thought framework that interleaves text with latent visual representations in VLMs, with a two-stage SFT + RL training setup for modality switching, achieving strong gains across 11 multimodal reasoning benchmarks.

      - company: Purdue University
        position: Research Intern
        location: Indiana, United States
        start_date: Feb 2025
        end_date: Jul 2025
        summary: Studied Bayesian sampling and inference-time alignment methods for language models, improving response quality and steering outputs toward harmlessness and positive sentiment.

      - company: Insituate
        position: Co-Founder
        location: New Delhi, India
        start_date: Sep 2023
        end_date: Feb 2025
        summary: Founded Insituate and grew it to $250K ARR, building on-premise AI agents using open-source LLMs and RAG systems for enterprise use cases; deployments included Singapore Judiciary, Indian High Courts, Mizuho Bank, and PNC Bank.

