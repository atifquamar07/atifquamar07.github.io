  image: assets/img/atif_quamar_profile.jpg
  summary: I like to understand how foundation models reason, how their reasoning abilities emerge through training, and how we can make that reasoning more efficient and trustworthy. Much of my work spans language and vision, with a focus on training and aligning models to be safe and aligned with human values.

